services:
  patrik-warranty-form:
    image: time4action/patrik-warranty-form:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MAPBOX_API_KEY: ${NEXT_PUBLIC_MAPBOX_API_KEY}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
    container_name: patrik-warranty-form
    restart: unless-stopped
    ports:
      - "4000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
